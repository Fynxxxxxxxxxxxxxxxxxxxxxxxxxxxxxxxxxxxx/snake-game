name: Build APK
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'
    
    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          autoconf \
          automake \
          libtool \
          libffi-dev \
          libssl-dev \
          pkg-config \
          zlib1g-dev \
          libncurses5-dev \
          libncursesw5-dev \
          libtinfo5 \
          cmake \
          libltdl-dev \
          openjdk-17-jdk \
          git \
          unzip \
          xz-utils
    
    - name: Install Python Dependencies
      run: |
        pip install --upgrade pip
        pip install buildozer
        pip install cython==0.29.33
    
    - name: Create buildozer.spec
      run: |
        cat > buildozer.spec << 'ENDOFFILE'
        [app]
        title = Snake Game
        package.name = snakegame
        package.domain = com.fynx
        source.dir = .
        source.include_exts = py
        version = 1.0
        requirements = python3,kivy==2.1.0
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET
        android.api = 31
        android.minapi = 21
        android.ndk = 23b
        android.sdk = 31
        android.allow_backup = True
        p4a.branch = develop
        
        [buildozer]
        log_level = 2
        warn_on_root = 1
        ENDOFFILE
    
    - name: Build APK
      run: |
        buildozer android debug
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: SnakeGame-APK
        path: bin/*.apk
