name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y autoconf automake libtool libffi-dev libssl-dev pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libltdl-dev openjdk-17-jdk git unzip
        pip install buildozer cython==0.29.33
    - name: Build APK
      run: |
        buildozer init
        cat > buildozer.spec << 'EOF'
        [app]
        title = Snake Game
        package.name = snakegame
        package.domain = com.fynx
        source.dir = .
        source.include_exts = py
        version = 1.0
        requirements = python3,kivy==2.1.0
        orientation = portrait
        fullscreen = 0
        android.permissions = INTERNET
        android.api = 31
        android.minapi = 21
        android.ndk = 23b
        android.sdk = 31
        android.allow_backup = True
        p4a.branch = develop
        [buildozer]
        log_level = 2
        warn_on_root = 1
        EOF
        buildozer android debug
    - uses: actions/upload-artifact@v3
      with:
        name: SnakeGame-APK
        path: bin/*.apk
